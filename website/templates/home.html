{% extends 'base.html' %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='input.css') }}">
{% endblock %}

{% block content %}
<div class="input-container">
    <div class="left-panel">

        <img src="../static/images/Rithm-logo(Y).png" alt="Rithm Logo" class="logo-placeholder">
    </div>
    
    <div class="right-panel">
        <h2 class="app-title">CPU SCHEDULING SIM</h2>
        <form method="POST" action="/" class="input-form">
            <div class="form-group">
                <label for="algorithm">Algorithm</label>
                <select id="algorithm" name="algorithm" class="form-input">
                    <option value="FCFS">FCFS</option>
                    <option value="SJF">SJF</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="ATime">Arrival Time</label>
                <input type="text" id="ATime" name="ATime" class="form-input" placeholder="e.g., 0 1 2" required>
            </div>
            
            <div class="form-group">
                <label for="BTime">Burst Time</label>
                <input type="text" id="BTime" name="BTime" class="form-input" placeholder="e.g., 4 3 2" required>
            </div>
            
            {% if errors %}
                <div class="error-box">
                    {% for error in errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                </div>
            {% endif %}
            
            <button type="submit" class="submit-btn">See Results</button>
        </form>
    </div>
</div>
{% endblock %}
